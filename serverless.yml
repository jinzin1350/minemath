service: minemath

provider:
  name: aws
  runtime: nodejs20.x
  region: us-east-1
  timeout: 29
  memorySize: 512
  environment:
    NODE_ENV: production
    DATABASE_URL: ${env:DATABASE_URL}
    SESSION_SECRET: ${env:SESSION_SECRET}
    PGDATABASE: ${env:PGDATABASE}
    PGHOST: ${env:PGHOST}
    PGPORT: ${env:PGPORT}
    PGUSER: ${env:PGUSER}
    PGPASSWORD: ${env:PGPASSWORD}

functions:
  api:
    handler: dist/lambda.handler
    events:
      - httpApi:
          path: /api/{proxy+}
          method: ANY
      - httpApi:
          path: /api
          method: ANY


package:
  patterns:
    - dist/**
    - node_modules/**
    - '!node_modules/.cache/**'
    - '!client/**'
    - '!attached_assets/**'
